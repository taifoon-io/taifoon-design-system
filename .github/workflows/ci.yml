name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-css:
    name: Validate CSS tokens
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check CSS file exists and is non-empty
        run: |
          test -f colors_and_type.css
          wc -l colors_and_type.css
          echo "CSS token file present."

      - name: Validate --tf-* variable count (must be >= 40)
        run: |
          count=$(grep -c -- '--tf-' colors_and_type.css)
          echo "Found $count --tf-* tokens."
          [ "$count" -ge 40 ] || { echo "ERROR: too few tokens ($count < 40)"; exit 1; }

      - name: Validate preview HTML exists
        run: |
          test -f preview/index.html
          echo "Preview HTML present."

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree
        run: gitleaks detect --no-git --redact -v

      - name: Scan git history
        run: gitleaks detect --redact -v --log-opts="--all"
